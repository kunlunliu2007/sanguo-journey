<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>读三国</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
  <style>
    :root {
      --ink: #1a1a1a;
      --ink-light: #2d2d2d;
      --paper: #f8f6f1;
      --paper-dark: #e8e4db;
      --stone: #8a8a8a;
      --moss: #4a5548;
      --rust: #8b4513;
      --clay: #a0522d;
      --mist: rgba(255,255,255,0.6);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Noto Serif SC', 'SimSun', serif;
      font-weight: 300;
      background: var(--paper);
      color: var(--ink);
      line-height: 2;
      letter-spacing: 0.05em;
    }

    /* 极简导航 */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 2rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      mix-blend-mode: difference;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 400;
      color: white;
      letter-spacing: 0.5em;
    }

    nav ul {
      display: flex;
      list-style: none;
      gap: 3rem;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      opacity: 0.8;
      transition: opacity 0.3s;
    }

    nav a:hover {
      opacity: 1;
    }

    /* Hero - 极简水墨意境 */
    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--ink);
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background: url('images/hero-bg.jpg') center/cover no-repeat;
      opacity: 0.4;
      filter: grayscale(60%) contrast(1.1);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      color: var(--paper);
    }

    .hero-poem {
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      line-height: 2.5;
      opacity: 0.7;
      margin-bottom: 4rem;
    }

    .hero-title {
      font-size: 4.5rem;
      font-weight: 300;
      letter-spacing: 1em;
      margin-left: 1em;
      margin-bottom: 1rem;
    }

    .hero-sub {
      font-size: 0.9rem;
      font-weight: 300;
      letter-spacing: 0.8em;
      opacity: 0.5;
    }

    .scroll-line {
      position: absolute;
      bottom: 4rem;
      left: 50%;
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, var(--paper), transparent);
      opacity: 0.3;
    }

    /* Section 通用 */
    section {
      padding: 8rem 0;
    }

    .section-header {
      text-align: center;
      margin-bottom: 5rem;
    }

    .section-title {
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: 0.5em;
      color: var(--ink);
    }

    .section-line {
      width: 40px;
      height: 1px;
      background: var(--stone);
      margin: 1.5rem auto 0;
    }

    /* 今日故事 */
    .story-section {
      background: var(--ink);
      color: var(--paper);
    }

    .story-section .section-title {
      color: var(--paper);
    }

    .story-section .section-line {
      background: rgba(255,255,255,0.3);
    }

    .story-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 4rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6rem;
      align-items: center;
    }

    .story-image {
      position: relative;
    }

    .story-image img {
      width: 100%;
      aspect-ratio: 4/5;
      object-fit: cover;
      filter: grayscale(30%) contrast(1.05);
    }

    .story-image::after {
      content: '';
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 100px rgba(0,0,0,0.3);
      pointer-events: none;
    }

    .story-content {
      padding: 2rem 0;
    }

    .story-title {
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      margin-bottom: 0.5rem;
    }

    .story-meta {
      font-size: 0.8rem;
      opacity: 0.5;
      letter-spacing: 0.15em;
      margin-bottom: 2rem;
    }

    .story-text {
      font-size: 0.95rem;
      line-height: 2.2;
      opacity: 0.8;
      margin-bottom: 2.5rem;
    }

    .story-characters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-bottom: 2.5rem;
    }

    .character-tag {
      padding: 0.4rem 1rem;
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.3s;
      background: transparent;
      color: var(--paper);
    }

    .character-tag:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.4);
    }

    .story-btn {
      padding: 0.8rem 2rem;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: var(--paper);
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.3s;
    }

    .story-btn:hover {
      background: rgba(255,255,255,0.05);
    }

    .story-btn + .story-btn {
      margin-left: 1rem;
      border-color: rgba(255,255,255,0.15);
      opacity: 0.6;
    }

    /* 英雄列传 - 极简网格 */
    .heroes-section {
      background: var(--paper);
    }

    .heroes-grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 4rem;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 3px;
      background: var(--paper-dark);
    }

    .hero-card {
      background: var(--paper);
      cursor: pointer;
      transition: all 0.5s ease;
      overflow: hidden;
    }

    .hero-card:hover {
      background: var(--ink);
      color: var(--paper);
    }

    .hero-card-image {
      aspect-ratio: 1;
      overflow: hidden;
    }

    .hero-card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%);
      transition: all 0.5s ease;
    }

    .hero-card:hover .hero-card-image img {
      filter: grayscale(0%);
      transform: scale(1.05);
    }

    .hero-card-content {
      padding: 1.5rem;
      text-align: center;
    }

    .hero-card-name {
      font-size: 1.3rem;
      font-weight: 400;
      letter-spacing: 0.3em;
      margin-bottom: 0.3rem;
    }

    .hero-card-title {
      font-size: 0.7rem;
      opacity: 0.5;
      letter-spacing: 0.1em;
      margin-bottom: 0.8rem;
    }

    .hero-card-quote {
      font-size: 0.75rem;
      opacity: 0.6;
      font-style: italic;
    }

    .hero-faction {
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-size: 0.65rem;
      padding: 0.2rem 0.5rem;
      background: var(--ink);
      color: var(--paper);
      letter-spacing: 0.1em;
    }

    .hero-card {
      position: relative;
    }

    /* 行迹地图 */
    .journey-section {
      background: var(--ink-light);
      color: var(--paper);
    }

    .journey-section .section-title {
      color: var(--paper);
    }

    .journey-section .section-line {
      background: rgba(255,255,255,0.2);
    }

    .hero-selector {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 3rem;
      flex-wrap: wrap;
    }

    .hero-selector-btn {
      padding: 0.5rem 1.2rem;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--paper);
      font-family: inherit;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .hero-selector-btn img {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      object-fit: cover;
      filter: grayscale(100%);
      transition: filter 0.3s;
    }

    .hero-selector-btn:hover,
    .hero-selector-btn.active {
      border-color: rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.05);
    }

    .hero-selector-btn:hover img,
    .hero-selector-btn.active img {
      filter: grayscale(0%);
    }

    .map-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 4rem;
    }

    .map-wrapper {
      position: relative;
      aspect-ratio: 16/10;
      background: var(--ink);
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .map-legend {
      position: absolute;
      bottom: 1.5rem;
      left: 1.5rem;
      display: flex;
      gap: 1.5rem;
      font-size: 0.7rem;
      opacity: 0.6;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .legend-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .legend-dot.birth { background: #6b8e6b; }
    .legend-dot.battle { background: #a05a5a; }
    .legend-dot.capital { background: #8b8b6b; }
    .legend-dot.death { background: #5a5a5a; }

    /* 怀古景点 */
    .attractions-section {
      background: var(--paper);
    }

    .attractions-grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 4rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
    }

    .attraction-card {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      cursor: pointer;
    }

    .attraction-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(40%);
      transition: all 0.6s ease;
    }

    .attraction-card:hover img {
      filter: grayscale(0%);
      transform: scale(1.05);
    }

    .attraction-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 2rem;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .attraction-card:hover .attraction-overlay {
      opacity: 1;
    }

    .attraction-name {
      font-size: 1.2rem;
      color: var(--paper);
      letter-spacing: 0.2em;
      margin-bottom: 0.3rem;
    }

    .attraction-location {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.1em;
    }

    /* Footer */
    footer {
      padding: 6rem 0;
      background: var(--ink);
      text-align: center;
      color: var(--paper);
    }

    .footer-poem {
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.4em;
      opacity: 0.4;
      margin-bottom: 2rem;
    }

    .footer-line {
      width: 30px;
      height: 1px;
      background: rgba(255,255,255,0.2);
      margin: 0 auto;
    }

    /* 响应式 */
    @media (max-width: 1000px) {
      .heroes-grid {
        grid-template-columns: repeat(3, 1fr);
      }
      
      .story-container {
        grid-template-columns: 1fr;
        gap: 3rem;
      }
    }

    @media (max-width: 700px) {
      .hero-title {
        font-size: 2.5rem;
        letter-spacing: 0.5em;
        margin-left: 0.5em;
      }

      .heroes-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .attractions-grid {
        grid-template-columns: 1fr;
      }

      nav ul {
        display: none;
      }

      section {
        padding: 5rem 0;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">读三国</div>
    <ul>
      <li><a href="#story">故事</a></li>
      <li><a href="#heroes">列传</a></li>
      <li><a href="#journey">行迹</a></li>
      <li><a href="#attractions">遗迹</a></li>
    </ul>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <p class="hero-poem">
        滚滚长江东逝水<br>
        浪花淘尽英雄
      </p>
      <h1 class="hero-title">三国</h1>
      <p class="hero-sub">英雄足迹</p>
    </div>
    <div class="scroll-line"></div>
  </section>

  <!-- 故事 -->
  <section class="story-section" id="story">
    <div class="section-header">
      <h2 class="section-title">今日故事</h2>
      <div class="section-line"></div>
    </div>
    <div class="story-container">
      <div class="story-image">
        <img id="storyImage" src="images/sangu.jpg" alt="">
      </div>
      <div class="story-content">
        <h3 class="story-title" id="storyTitle">三顾茅庐</h3>
        <p class="story-meta" id="storyMeta">公元 207 年 · 隆中</p>
        <p class="story-text" id="storyText">
          建安十二年，刘备三访卧龙岗，终得诸葛亮出山相助。孔明于草庐之中，为刘备分析天下大势，提出"隆中对"战略。这一会面，改变了三国历史的走向。
        </p>
        <div class="story-characters" id="storyCharacters">
          <span class="character-tag">刘备</span>
          <span class="character-tag">诸葛亮</span>
        </div>
        <button class="story-btn" id="exploreBtn">探索足迹</button>
        <button class="story-btn" id="nextBtn">下一个</button>
      </div>
    </div>
  </section>

  <!-- 英雄 -->
  <section class="heroes-section" id="heroes">
    <div class="section-header">
      <h2 class="section-title">英雄列传</h2>
      <div class="section-line"></div>
    </div>
    <div class="heroes-grid" id="heroesGrid"></div>
  </section>

  <!-- 行迹 -->
  <section class="journey-section" id="journey">
    <div class="section-header">
      <h2 class="section-title" id="mapTitle">行迹</h2>
      <div class="section-line"></div>
    </div>
    <div class="hero-selector" id="heroSelector"></div>
    <div class="map-container">
      <div class="map-wrapper">
        <div id="map"></div>
        <div class="map-legend">
          <div class="legend-item"><span class="legend-dot birth"></span>生</div>
          <div class="legend-item"><span class="legend-dot battle"></span>战</div>
          <div class="legend-item"><span class="legend-dot capital"></span>城</div>
          <div class="legend-item"><span class="legend-dot death"></span>殁</div>
        </div>
      </div>
    </div>
  </section>

  <!-- 遗迹 -->
  <section class="attractions-section" id="attractions">
    <div class="section-header">
      <h2 class="section-title">怀古</h2>
      <div class="section-line"></div>
    </div>
    <div class="attractions-grid" id="attractionsGrid"></div>
  </section>

  <footer>
    <p class="footer-poem">古今多少事 都付笑谈中</p>
    <div class="footer-line"></div>
  </footer>

      { title: '赤壁之战', year: 208, location: '赤壁', image: 'images/chibi.jpg',
        text: '建安十三年，曹操率大军南下。孙刘联军借东风火烧连营，大破曹军。此战奠定三分天下之势。',
        characters: ['zhouyu', 'zhugeliang', 'caocao'] },
      { title: '桃园结义', year: 184, location: '涿郡', image: 'images/taoyuan.jpg',
        text: '刘关张三人于桃园结为异姓兄弟。"不求同年同月同日生，只愿同年同月同日死。"',
        characters: ['liubei', 'guanyu', 'zhangfei'] },
      { title: '白帝托孤', year: 223, location: '白帝城', image: 'images/baidi.jpg',
        text: '章武三年，刘备病重，召诸葛亮至白帝城托付后事。"君可自取。"孔明泣拜："臣敢竭股肱之力。"',
        characters: ['liubei', 'zhugeliang'] },
      { title: '空城计', year: 228, location: '西城', image: 'images/kongcheng.jpg',
        text: '诸葛亮城中无兵，大开城门，独坐城楼抚琴。司马懿疑有伏兵，不敢进攻，引军退去。',
        characters: ['zhugeliang', 'simayi'] },
      { title: '五丈原', year: 234, location: '五丈原', image: 'images/wuzhangyuan.jpg',
        text: '诸葛亮病逝军中。"出师未捷身先死，长使英雄泪满襟。"一代名相，鞠躬尽瘁。',
        characters: ['zhugeliang', 'simayi'] }
    ];

    const attractions = [
      { name: '赤壁', location: '湖北咸宁', image: 'images/attraction-chibi.jpg' },
      { name: '武侯祠', location: '四川成都', image: 'images/attraction-wuhou.jpg' },
      { name: '白帝城', location: '重庆奉节', image: 'images/attraction-baidi.jpg' },
      { name: '古隆中', location: '湖北襄阳', image: 'images/attraction-longzhong.jpg' },
      { name: '曹操墓', location: '河南安阳', image: 'images/attraction-caocao.jpg' },
      { name: '关林', location: '河南洛阳', image: 'images/attraction-guanlin.jpg' }
    ];

    let storyIdx = 0, heroId = 'zhugeliang', map;

    function initHeroes() {
      document.getElementById('heroesGrid').innerHTML = heroes.map(h => `
        <div class="hero-card" data-id="${h.id}">
          <span class="hero-faction">${h.faction}</span>
          <div class="hero-card-image"><img src="${h.image}" alt="${h.name}"></div>
          <div class="hero-card-content">
            <h3 class="hero-card-name">${h.name}</h3>
            <p class="hero-card-title">${h.title}</p>
            <p class="hero-card-quote">${h.quote}</p>
          </div>
        </div>
      `).join('');
      
      document.querySelectorAll('.hero-card').forEach(c => c.onclick = () => {
        loadJourney(c.dataset.id);
        document.getElementById('journey').scrollIntoView({ behavior: 'smooth' });
      });
    }

    function initSelector() {
      document.getElementById('heroSelector').innerHTML = heroes.slice(0,6).map(h => `
        <button class="hero-selector-btn ${h.id === heroId ? 'active' : ''}" data-id="${h.id}">
          <img src="${h.image}" alt="">${h.name}
        </button>
      `).join('');
      
      document.querySelectorAll('.hero-selector-btn').forEach(b => b.onclick = () => {
        document.querySelectorAll('.hero-selector-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        loadJourney(b.dataset.id);
      });
    }

    function initAttractions() {
      document.getElementById('attractionsGrid').innerHTML = attractions.map(a => `
        <div class="attraction-card">
          <img src="${a.image}" alt="${a.name}">
          <div class="attraction-overlay">
            <h3 class="attraction-name">${a.name}</h3>
            <p class="attraction-location">${a.location}</p>
          </div>
        </div>
      `).join('');
    }

    function loadStory(i) {
      const s = stories[i];
      document.getElementById('storyTitle').textContent = s.title;
      document.getElementById('storyMeta').textContent = `公元 ${s.year} 年 · ${s.location}`;
      document.getElementById('storyText').textContent = s.text;
      document.getElementById('storyImage').src = s.image;
      document.getElementById('storyCharacters').innerHTML = s.characters.map(id => {
        const h = heroes.find(x => x.id === id);
        return h ? `<span class="character-tag" data-id="${id}">${h.name}</span>` : '';
      }).join('');
      document.querySelectorAll('.character-tag').forEach(t => t.onclick = () => {
        loadJourney(t.dataset.id);
        document.getElementById('journey').scrollIntoView({ behavior: 'smooth' });
      });
    }

    function loadJourney(id) {
      heroId = id;
      const h = heroes.find(x => x.id === id);
      if (!h) return;
      
      document.getElementById('mapTitle').textContent = h.name + ' · 行迹';
      document.querySelectorAll('.hero-selector-btn').forEach(b => b.classList.toggle('active', b.dataset.id === id));

      ['journey-line', 'journey-points'].forEach(src => {
        if (map.getSource(src)) {
          map.removeLayer(src + '-layer');
          map.removeSource(src);
        }
      });

      const coords = h.journeys.map(j => j.coords);
      
      map.addSource('journey-line', {
        type: 'geojson',
        data: { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } }
      });
      
      map.addLayer({
        id: 'journey-line-layer',
        type: 'line',
        source: 'journey-line',
        paint: { 'line-color': '#666', 'line-width': 1, 'line-dasharray': [4, 2] }
      });

      map.addSource('journey-points', {
        type: 'geojson',
        data: {
          type: 'FeatureCollection',
          features: h.journeys.map(j => ({
            type: 'Feature',
            geometry: { type: 'Point', coordinates: j.coords },
            properties: j
          }))
        }
      });

      map.addLayer({
        id: 'journey-points-layer',
        type: 'circle',
        source: 'journey-points',
        paint: {
          'circle-radius': 5,
          'circle-color': ['match', ['get', 'type'], 'birth', '#6b8e6b', 'battle', '#a05a5a', 'capital', '#8b8b6b', 'death', '#5a5a5a', '#666'],
          'circle-stroke-width': 1,
          'circle-stroke-color': '#fff'
        }
      });

      const bounds = coords.reduce((b, c) => b.extend(c), new maplibregl.LngLatBounds(coords[0], coords[0]));
      map.fitBounds(bounds, { padding: 50 });

      map.on('click', 'journey-points-layer', e => {
        const p = e.features[0].properties;
        new maplibregl.Popup().setLngLat(e.lngLat).setHTML(`<b>${p.name}</b><br>${p.year}年`).addTo(map);
      });
    }

    function initMap() {
      map = new maplibregl.Map({
        container: 'map',
        style: {
          version: 8,
          sources: { 'carto': { type: 'raster', tiles: ['https://a.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}@2x.png'], tileSize: 256 } },
          layers: [{ id: 'carto', type: 'raster', source: 'carto' }]
        },
        center: [108, 34],
        zoom: 4
      });
      map.on('load', () => loadJourney(heroId));
    }

    document.getElementById('nextBtn').onclick = () => { storyIdx = (storyIdx + 1) % stories.length; loadStory(storyIdx); };
    document.getElementById('exploreBtn').onclick = () => {
      const s = stories[storyIdx];
      if (s.characters[0]) { loadJourney(s.characters[0]); document.getElementById('journey').scrollIntoView({ behavior: 'smooth' }); }
    };

    document.addEventListener('DOMContentLoaded', () => {
      initHeroes();
      initSelector();
      initAttractions();
      initMap();
      loadStory(0);
    });
  </script>
</body>
</html>
